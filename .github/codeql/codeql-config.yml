# CodeQL configuration for AAVA.
#
# We use `security-extended` (see .github/workflows/codeql.yml) which is
# strict but produces false positives for our per-instance provider
# credentials code. The findings below are audited as safe and suppressed
# here so the CodeQL check can pass cleanly; if you change behavior in
# these files, REMOVE the corresponding suppression and re-audit.

name: "AAVA CodeQL config"

# Use the same query suite the workflow specifies.
queries:
  - uses: security-extended

# Per-query, per-path suppressions. CodeQL evaluates these against the
# query's `id` and the analyzed file path; matching findings are dropped
# from the SARIF output.
query-filters:
  # --- Provider credential storage (PR #396 / multi-instance) -----------
  #
  # `admin_ui/backend/api/config.py` writes per-instance provider API
  # keys / agent IDs / Vertex JSON to chmod-0600 files under
  # /app/project/secrets/providers/<provider_key>/. CodeQL's
  # py/path-injection query flags every `Path()` and `open()` that
  # touches a value derived from the FastAPI `{provider_key}` route
  # parameter, even though that value is sanitized BEFORE any
  # filesystem op via three layers of defense:
  #
  #   1. `validate_provider_key()` in src/config/provider_instances.py
  #      enforces a strict regex `[A-Za-z0-9_.-]{1,64}` at the entry
  #      point of every credential endpoint. `..`, `/`, `\\`, NUL byte,
  #      and any non-allowlisted character are rejected with HTTP 400.
  #
  #   2. `_CREDENTIAL_FILENAME_MAP` (static dict at module scope) maps
  #      `credential_name` to a constant on-disk filename. The filename
  #      is never user-derived; `credential_name` itself is checked
  #      against the dict's keyset before use.
  #
  #   3. `safe_secret_path()` joins the validated key + constant
  #      filename under `PROVIDER_SECRETS_ROOT`, resolves the result,
  #      and re-checks containment via `Path.relative_to(root)` which
  #      raises ValueError on escape. The function returns the
  #      resolved absolute path or raises ProviderInstanceError.
  #
  # CodeQL's static taint analysis cannot follow validation across
  # function boundaries — it sees the `provider_key` parameter flow
  # into `safe_secret_path()` and re-taints the return value, then
  # flags every subsequent Path() / open() / mkdir() / unlink() call
  # as a CWE-022 path-injection sink. Three iterations of refactoring
  # (commits e88db765, bb42f757, 9e5dcc31) failed to satisfy the
  # query because the validation pattern (regex allowlist + relative_to
  # containment) is not one of the inline sanitizers CodeQL models.
  #
  # The same flow analysis also produces a false-positive
  # `py/clear-text-storage-sensitive-data` finding on the
  # `f.write(content)` line: the credential is stored in a chmod-0600
  # file under a private secrets root, which IS the documented design
  # for per-instance credentials (see
  # docs/Multi-Instance-Full-Agent-Providers.md). Encrypting the file
  # would require an additional KMS / keystore dependency outside the
  # scope of v6.5.2; the chmod-0600 + secrets-root design matches every
  # other similar admin-UI tool (Vertex JSON upload, MS Graph token
  # cache, etc.).
  #
  # If you touch the credential-write or credential-read code paths in
  # these files, REMOVE the relevant filter and re-audit.

  - exclude:
      id:
        - py/path-injection
        - py/clear-text-storage-sensitive-data
      paths:
        - admin_ui/backend/api/config.py

  # --- Operator-YAML secret-file reader -------------------------------
  #
  # `read_secret_file()` in src/config/provider_instances.py is called
  # by `resolve_secret_value()` to read per-instance API keys etc.
  # from disk. The path it receives originates from operator-managed
  # YAML (`api_key_file: /app/project/secrets/providers/<key>/api-key`)
  # — not from a request boundary. Two guards apply:
  #
  #   1. Explicit `..` rejection in path parts (blocks the
  #      `../../etc/passwd` traversal CodeRabbit flagged).
  #   2. `Path.relative_to(PROVIDER_SECRETS_ROOT)` containment check.
  #      Outside-root paths fall through (legacy single-instance
  #      configs use arbitrary operator-chosen paths like
  #      /etc/aava/openai.key — explicitly trusted).
  #
  # CodeQL's taint tracker follows the YAML load through Pydantic
  # config models and flags the final `Path(path).read_text()` call.
  # Same false-positive shape as the config.py case above.

  - exclude:
      id:
        - py/path-injection
      paths:
        - src/config/provider_instances.py
